<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>StreamOps Music Overlay</title>
  <style>
    body {
      margin: 0;
      width: 520px;
      height: 78px;
      background: transparent;
      overflow: hidden;
      font-family: Segoe UI, Arial, sans-serif;
    }

    .overlay {
      width: 520px;
      height: 78px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(36, 14, 42, 0.62), rgba(10, 8, 16, 0.48));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(12px);
      color: white;
      box-sizing: border-box;
      padding: 10px 14px;
      overflow: hidden;
    }

    .title {
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }

    .artist {
      color: rgba(255,255,255,.6);
    }

    .row {
      display: grid;
      grid-template-columns: 42px 1fr 48px;
      gap: 8px;
      align-items: center;
    }

    .time {
      font-size: 10px;
      color: rgba(255,255,255,.58);
      font-variant-numeric: tabular-nums;
    }

    .bar {
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff5500, #ffb000);
      transition: width .35s linear;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="title">
      <span class="artist" id="artist">SoundCloud</span>
      <span> — </span>
      <span id="title">Esperando reproducción...</span>
    </div>

    <div class="row">
      <div class="time" id="current">0:00</div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="time" id="duration">0:00</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const ENDPOINT = `/api/nowplaying${token ? `?token=${encodeURIComponent(token)}` : ""}`;

    async function refresh() {
      try {
        const r = await fetch(ENDPOINT + (ENDPOINT.includes("?") ? "&" : "?") + "t=" + Date.now());
        const d = await r.json();

        document.getElementById("artist").textContent = d.artist || "SoundCloud";
        document.getElementById("title").textContent = d.title || "Esperando reproducción...";
        document.getElementById("current").textContent = d.currentTime || "0:00";
        document.getElementById("duration").textContent = d.duration || "0:00";
        document.getElementById("fill").style.width = `${Math.min(100, Math.max(0, Number(d.progress || 0)))}%`;
      } catch {}
    }

    setInterval(refresh, 1000);
    refresh();
  </script>
</body>
</html>
